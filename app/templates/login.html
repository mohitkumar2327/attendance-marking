{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh; margin-left:-240px;">
  <div class="card p-4" style="width:380px;">
    <div class="text-center mb-4">
      <i class="bi bi-camera-video-fill text-primary" style="font-size:2.5rem;"></i>
      <h4 class="mt-2 fw-bold">Attendance System</h4>
      <p class="text-muted small">School / College Login</p>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i> Login
      </button>
    </form>
    <p class="text-center text-muted small mt-3">Default: admin / admin123</p>
  </div>
</div>
{% endblock %}
