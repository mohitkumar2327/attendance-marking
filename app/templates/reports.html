{% extends "base.html" %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-file-earmark-bar-graph me-2"></i>Reports</h4>

<div class="card p-4" style="max-width:600px;">
  <h6 class="fw-semibold mb-3">Export Attendance Report</h6>
  <div class="row g-3 align-items-end">
    <div class="col-md-4">
      <label class="form-label fw-semibold">From Date</label>
      <input type="date" id="from-date" class="form-control"/>
    </div>
    <div class="col-md-4">
      <label class="form-label fw-semibold">To Date</label>
      <input type="date" id="to-date" class="form-control"/>
    </div>
    <div class="col-md-4 d-flex gap-2">
      <button class="btn btn-success w-100" onclick="exportExcel()">
        <i class="bi bi-file-earmark-excel me-1"></i> Excel
      </button>
      <button class="btn btn-danger w-100" onclick="exportPDF()">
        <i class="bi bi-file-earmark-pdf me-1"></i> PDF
      </button>
    </div>
  </div>
  <p class="text-muted small mt-3 mb-0">
    Leave dates empty to export today's report only.
  </p>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Set default dates to today
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("from-date").value = today;
  document.getElementById("to-date").value   = today;

  function exportExcel() {
    const from = document.getElementById("from-date").value;
    const to   = document.getElementById("to-date").value;
    window.location.href = `/reports/export/excel?from=${from}&to=${to}`;
  }
  function exportPDF() {
    const from = document.getElementById("from-date").value;
    const to   = document.getElementById("to-date").value;
    window.location.href = `/reports/export/pdf?from=${from}&to=${to}`;
  }
</script>
{% endblock %}
